- name: Item Box 1
  zone: Sandopolis
  act: 2
  type: super_ring
  requirements:
    - character: Tails
      # To reach this, jump from the platform that moves up and down right at
      # the beginning of the level to start flying as high as possible. Make
      # sure to grab at last one ring on the way up. Tails will get tired and
      # then get damaged by the spikes. If Tails lands on the spikes, he can
      # use his invincibility time after getting hurt to start another flight
      # up. This will allow him to reach the area with this item box.
      difficulty: hard
    - character: Knuckles
