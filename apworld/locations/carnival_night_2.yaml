- name: Boss
  zone: Carnival Night
  act: 2
  type: boss
  requirements:
    - character: Sonic
    - character: Tails
    - character: Knuckles
      # For Knuckles, get into Sonic/Tails path as described below. Then when
      # you get to the part where Knuckles would normally hit the switch to
      # push Sonic/Tails up to the boss, either stop before falling to the
      # switch area, or climb back up if you fall. Once in the section between
      # the two pipes, you can time a jump into a glide so that Knuckles will
      # latch to the wall of the upper pipe. From there you can climb up to the
      # boss.
      difficulty: hard
