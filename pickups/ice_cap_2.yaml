- name: Item Box 1
  zone: Ice Cap
  act: 2
  type: lightning_shield
  requirements:
    - character: Sonic
    - character: Tails
    - character: Knuckles
      # For this pickup and all pickups on the Sonic/Tails only path, there is
      # a ramp before the water section with the floating platforms where big
      # ring is located. As Super or Hyper Knuckles, you can build enough speed
      # with the two loops before the ramp to fling Knuckles up into the bouncy
      # sping. You can then backtrack all of the way to the Sonic/Tail spawn
      # point to get the pickups.
      super_state: super
      difficulty: hard
